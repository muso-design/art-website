<style>
/* ── SELF-HOSTED FONTS (BRIEF §Legal — no Google Fonts CDN) ─────────── */
@font-face{font-family:"Cormorant Garamond";font-style:normal;font-weight:300;font-display:swap;src:url("fonts/CormorantGaramond-Light.woff2") format("woff2")}
@font-face{font-family:"Cormorant Garamond";font-style:normal;font-weight:400;font-display:swap;src:url("fonts/CormorantGaramond-Regular.woff2") format("woff2")}
@font-face{font-family:"Cormorant Garamond";font-style:normal;font-weight:500;font-display:swap;src:url("fonts/CormorantGaramond-Medium.woff2") format("woff2")}
@font-face{font-family:"Cormorant Garamond";font-style:normal;font-weight:600;font-display:swap;src:url("fonts/CormorantGaramond-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Cormorant Garamond";font-style:italic;font-weight:300;font-display:swap;src:url("fonts/CormorantGaramond-LightItalic.woff2") format("woff2")}
@font-face{font-family:"Cormorant Garamond";font-style:italic;font-weight:400;font-display:swap;src:url("fonts/CormorantGaramond-Italic.woff2") format("woff2")}

/* ── ACCESSIBILITY UTILITIES ─────────────────────────────────────────── */
/* Visually hidden but accessible to screen readers */
.visually-hidden{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0
}
/* Skip-to-content link — visible on focus only */
.skip-link{
  position:fixed;top:-100%;left:20px;z-index:9999;
  background:var(--text,#0c0b0a);color:var(--bg,#fff);
  padding:8px 16px;font-size:12px;letter-spacing:0.12em;
  text-transform:uppercase;text-decoration:none;border-radius:2px;
  transition:top 0.15s;outline:none
}
.skip-link:focus{top:8px}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;--bg2:#f5f4f1;--bg3:#e8e7e4;
  --text:#0c0b0a;--mid:#5c5855;--dim:#9c9890;
  --border:rgba(12,11,10,0.09);
  --font:"Cormorant Garamond",serif;
  --body-size:20px;--body-lh:1.88;
  --nav-name-size:15px;--nav-link-size:11px;
  --grid-title-size:22px;--grid-series-size:11px;
  --lb-title-size:34px;--lb-meta-size:17px;
  --label-size:11px;
  --page-padding:64px;--grid-gap:28px;
  --slide-transition:900ms;
  /* ── layout ── */
  --nav-v-pad:28px;--footer-v-pad:18px;
  --grid-max-width:1100px;--grid-img-ratio:4/5;
  --lb-img-width:45vw;--lb-img-max:640px;
  --lb-gallery-gap:2.5em;
  --lb-dots-offset:64px;--lb-panel-offset:56px;--lb-panel-width:240px;
  --bio-max-width:680px;--contact-max-width:760px;
  --studio-max-width:1000px;--studio-ratio:16/10;
  --content-pad:32px;
  --ss-gradient-height:120px;--ss-gradient-opacity:0.5;
}

html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  font-size:var(--body-size);line-height:var(--body-lh);overflow-x:hidden;min-height:100vh;
  /* Smoother text rendering (notably on macOS/retina) + kerning & ligatures */
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;font-kerning:normal}

/* ── NAV ─────────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--nav-v-pad) var(--page-padding);
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),background 0.3s,border-color 0.3s;
  will-change:transform;
}
/* Slides up into the top edge when scrolling down (see onScroll) */
nav.nav-hidden{transform:translateY(-100%)}
nav.dark{
  background:var(--bg); /* fallback for browsers without color-mix */
  background:color-mix(in srgb,var(--bg) 80%,transparent);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border)
}
nav.light{background:transparent;border-bottom:1px solid transparent}
.nav-name{
  font-size:var(--nav-name-size);letter-spacing:0.18em;text-transform:uppercase;
  font-weight:600;cursor:pointer;text-decoration:none
}
nav.dark .nav-name{color:var(--text)}
nav.light .nav-name{color:#ffffff}
.nav-links{display:flex;gap:48px;list-style:none}
.nav-links a{
  font-size:var(--nav-link-size);letter-spacing:0.24em;text-transform:uppercase;
  text-decoration:none;font-weight:500;cursor:pointer;transition:opacity 0.2s
}
nav.dark .nav-links a{color:var(--text);opacity:0.35}
nav.dark .nav-links a:hover,nav.dark .nav-links a.active{opacity:1}
nav.light .nav-links a{color:#ffffff;opacity:0.6}
nav.light .nav-links a:hover,nav.light .nav-links a.active{opacity:1}

/* ── PAGES ───────────────────────────────────────────────── */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* ── HOME / SLIDESHOW ────────────────────────────────────── */
#page-home{padding-top:0}
.slideshow{position:relative;width:100%;height:100vh;overflow:hidden;background:#111}
.slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity var(--slide-transition) ease
}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.slide-caption{
  position:absolute;bottom:48px;left:var(--page-padding);
  color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:0.1em;
  text-transform:uppercase
}
.ss-arrows{display:none}
.ss-dots{
  position:absolute;bottom:52px;right:var(--page-padding);
  display:none;gap:12px;z-index:5
}
.ss-dot{
  width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.3);
  border:none;cursor:pointer;transition:background 0.25s;padding:0
}
.ss-dot.active{background:#ffffff}

/* Top gradient for nav legibility */
.slideshow::after{
  content:'';position:absolute;top:0;left:0;right:0;
  height:var(--ss-gradient-height);
  background:linear-gradient(to bottom,rgba(0,0,0,var(--ss-gradient-opacity)),transparent);
  z-index:4;pointer-events:none
}

/* ── WORKS ───────────────────────────────────────────────── */
#page-works{padding-top:0;background:var(--bg)}
.works-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:var(--grid-gap);
  max-width:var(--grid-max-width);
  margin:0 auto;
  padding:calc(28px + 28px + 1.2em + 28px) var(--content-pad) 140px;
}
/* Images stand directly on the page, no card chrome */
.work-card{background:transparent;cursor:pointer;position:relative;overflow:hidden}
.work-img-wrap{overflow:hidden;aspect-ratio:var(--grid-img-ratio);background:var(--bg2);position:relative}
.work-img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s ease;display:block}
/* Hover-swap detail shot — cross-fades in over the main image */
.work-img-hover{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;
  opacity:0;z-index:1;transition:opacity 0.45s ease,transform 0.7s ease
}
.work-card.has-hover:hover .work-img-hover{opacity:1}
/* hover: subtle zoom (applies to whichever image is showing) */
.work-card:hover .work-img,.work-card:hover .work-img-hover{transform:scale(1.04)}
/* Below-image text — flush with the left edge of the square */
.work-info{padding:12px 0 40px}
.work-title{
  font-size:var(--grid-title-size);font-weight:400;letter-spacing:0.01em;
  transition:font-weight 0.2s ease
}
.work-card:hover .work-title{font-weight:600}
.work-series{
  font-size:var(--grid-series-size);letter-spacing:0.12em;
  text-transform:uppercase;color:var(--dim);margin-top:5px
}

/* ── LIGHTBOX ────────────────────────────────────────────── */
.lightbox{
  display:none;position:fixed;inset:0;
  background:var(--bg);z-index:200
}
.lightbox.open{display:block}

/* Gallery — full-screen scrollable, images centered */
.lb-gallery{
  height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;
  align-items:center;gap:var(--lb-gallery-gap);
  padding:5em 0 8em
}
.lb-gallery figure{margin:0;cursor:zoom-in}
.lb-gallery-img{
  width:var(--lb-img-width);max-width:var(--lb-img-max);height:auto;display:block;
  transition:opacity 0.25s
}
.lb-gallery figure:hover .lb-gallery-img{opacity:0.78}

/* Dots — hug the left edge of the images */
.lb-dots{
  position:fixed;
  left:calc(50% - min(var(--lb-img-width) / 2, var(--lb-img-max) / 2) - var(--lb-dots-offset));
  top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:9px;z-index:202
}
.lb-dot{
  width:7px;height:7px;border-radius:50%;
  border:1px solid rgba(12,11,10,0.4);
  background:transparent;cursor:pointer;padding:0;
  transition:background 0.35s,border-color 0.35s
}
.lb-dot.on,.lb-dot:hover{background:var(--text);border-color:var(--text)}

/* Info panel — hugs the right edge of the images */
.lb-panel{
  position:fixed;
  left:calc(50% + min(var(--lb-img-width) / 2, var(--lb-img-max) / 2) + var(--lb-panel-offset));
  top:0;
  height:100vh;width:var(--lb-panel-width);
  display:flex;flex-direction:column;justify-content:center;
  padding:5em 1.5em 3em 0;
  overflow-y:auto
}

/* Close button — 3× size, sits below nav */
.lb-close{
  position:fixed;top:90px;right:40px;background:none;border:none;
  color:var(--text);font-size:72px;cursor:pointer;opacity:0.22;z-index:202;
  line-height:1;padding:0;font-family:var(--font)
}
.lb-close:hover{opacity:0.9}

.lb-title{
  font-size:34px;font-weight:400;
  margin-bottom:20px;line-height:1.15;
  letter-spacing:0.01em;color:var(--text)
}
.lb-meta{line-height:1;margin-top:0}
.lb-meta dt{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--dim);font-weight:500
}
.lb-meta dd{
  color:var(--mid);margin:5px 0 0;font-size:18px;font-weight:400;line-height:1.3
}
.lb-compact{
  margin-top:18px;font-size:14px;color:var(--dim);
  line-height:2.1;font-weight:400;letter-spacing:0.02em;
  border-top:1px solid var(--border);padding-top:14px
}
.lb-description{
  margin-top:20px;font-size:18px;line-height:1.65;
  color:var(--dim);border-top:1px solid var(--border);padding-top:18px
}

/* Zoom overlay */
.lb-zoom{
  display:none;position:fixed;inset:0;
  background:rgba(255,255,255,0.97);
  z-index:210;overflow:hidden
}
.lb-zoom.open{display:block}
.lb-zoom-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  cursor:zoom-in;user-select:none;touch-action:none
}
.lb-zoom img{
  max-width:90vw;max-height:92vh;object-fit:contain;display:block;
  pointer-events:none;transform-origin:center center;will-change:transform
}
.lb-zoom-close{
  position:absolute;top:24px;right:40px;background:none;border:none;
  color:var(--text);font-size:48px;cursor:pointer;opacity:0.28;z-index:211;
  line-height:1;padding:0;font-family:var(--font)
}
.lb-zoom-close:hover{opacity:0.9}
/* Main lightbox: prev/next work arrows */
.lb-prev,.lb-next{
  position:fixed;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text);
  font-size:72px;font-weight:300;line-height:1;
  cursor:pointer;opacity:0.14;z-index:202;
  padding:20px 28px;letter-spacing:-0.04em;
  transition:opacity 0.2s;font-family:var(--font);
  user-select:none
}
.lb-prev{left:0}.lb-next{right:0}
.lb-prev:hover,.lb-next:hover{opacity:0.8}

/* Zoom overlay: prev/next image arrows */
.lb-zoom-prev,.lb-zoom-next{
  position:absolute;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text);
  font-size:72px;font-weight:300;line-height:1;letter-spacing:-0.04em;
  cursor:pointer;opacity:0.18;
  z-index:211;padding:20px 32px;
  transition:opacity 0.2s;font-family:var(--font);
  user-select:none
}
.lb-zoom-prev:hover,.lb-zoom-next:hover{opacity:0.85}
.lb-zoom-prev:disabled,.lb-zoom-next:disabled{opacity:0.06;cursor:default;pointer-events:none}
.lb-zoom-prev{left:0}.lb-zoom-next{right:0}
#lb-zoom-img2{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) translateX(100vw);
  visibility:hidden
}

/* ── BIO ─────────────────────────────────────────────────── */
#page-bio{padding-top:0;background:var(--bg)}
.bio-wrap{
  padding:160px var(--content-pad) 72px;
  max-width:calc(var(--bio-max-width) + var(--content-pad) * 2);
  margin:0 auto
}
/* Full-width text, no sidebar */
.bio-text{margin-bottom:80px}
/* First paragraph: a gently emphasised lead (not oversized) */
.bio-text p:first-child{
  font-size:calc(var(--body-size) * 1.12);
  line-height:1.6;font-weight:400;color:var(--text);
  margin-bottom:1.5em
}
.bio-text p{margin-bottom:1.4em;color:var(--mid);font-size:var(--body-size);line-height:1.7}

/* Photo: full width (when present) — legacy element, kept hidden */
.bio-photo-full{
  width:100%;max-width:420px;aspect-ratio:3/4;object-fit:cover;
  display:block;margin-bottom:60px
}

/* ── BIO FIGURES (flexible placement via bio.csv) ───────────────
   Placement presets: full | wide | center | left | right
   Each image supports an optional aspect ratio, rotation, width and
   caption — all driven from bio.csv. See that file for the keys.      */
.bio-fig{margin:0.2em 0 2.2em;line-height:0;transform-origin:center center}
.bio-fig .bio-fig-inner{overflow:hidden;background:var(--bg2)}
.bio-fig img{display:block;width:100%;height:auto;object-fit:cover}
.bio-fig figcaption{
  margin-top:11px;line-height:1.45;
  font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim)
}
.bio-fig--full{width:100%}
.bio-fig--wide{
  width:auto;margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw);
  padding-left:max(var(--content-pad),calc(50vw - 50%));
  padding-right:max(var(--content-pad),calc(50vw - 50%))
}
.bio-fig--center{width:min(100%,var(--fig-w,560px));margin-left:auto;margin-right:auto}
.bio-fig--left{float:left;width:min(46%,var(--fig-w,420px));margin:0.4em 2.6em 1.4em 0}
.bio-fig--right{float:right;width:min(46%,var(--fig-w,420px));margin:0.4em 0 1.4em 2.6em}

/* Details: horizontal strip of facts — clears any floated bio figures */
.bio-meta{border-top:1px solid var(--border);padding-top:48px;clear:both}
.bio-details{display:flex;flex-wrap:wrap;gap:40px 72px}
.bio-details>div{min-width:120px}
.bio-details dt{
  font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);font-weight:500
}
.bio-details dd{font-size:18px;color:var(--mid);margin:8px 0 0;line-height:1.5;font-weight:400}

/* ── STUDIO SLIDESHOW (one horizontal image at a time + dots) ──────
   Sits between the bio text and the facts. Arrows on desktop, swipe
   + dots on mobile. Images come from bio.csv (process_* rows).      */
.process{
  max-width:calc(var(--studio-max-width) + var(--content-pad) * 2);
  margin:0 auto;padding:0 var(--content-pad) 96px
}
.process-head{margin-bottom:22px}
.process-title{
  font-size:var(--label-size);letter-spacing:0.3em;text-transform:uppercase;
  color:var(--dim);font-weight:500
}
.studio-stage{
  position:relative;width:100%;aspect-ratio:var(--studio-ratio,16/10);
  overflow:hidden;background:var(--bg2)
}
/* Native horizontal scroll-snap = real finger-following swipe on mobile */
.studio-track{
  display:flex;width:100%;height:100%;overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;overscroll-behavior-x:contain
}
.studio-track::-webkit-scrollbar{display:none}
.studio-slide{flex:0 0 100%;width:100%;height:100%;scroll-snap-align:center;scroll-snap-stop:always}
.studio-slide img{width:100%;height:100%;object-fit:cover;display:block}
.studio-arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:2;
  background:none;border:none;color:#fff;font-family:var(--font);
  font-size:46px;font-weight:300;line-height:1;letter-spacing:-0.04em;
  cursor:pointer;opacity:0.6;padding:10px 18px;transition:opacity 0.2s;
  text-shadow:0 1px 8px rgba(0,0,0,0.4)
}
.studio-arrow:hover{opacity:1}
.studio-prev{left:0}.studio-next{right:0}
.studio-dots{display:flex;justify-content:center;gap:10px;margin-top:18px}
.studio-dot{
  width:7px;height:7px;border-radius:50%;border:1px solid var(--dim);
  background:transparent;cursor:pointer;padding:0;transition:background 0.3s,border-color 0.3s
}
.studio-dot.on{background:var(--text);border-color:var(--text)}
.studio-caption{
  margin-top:14px;text-align:center;min-height:1em;
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim)
}

/* ── BIO META (facts + collapsible credits), under the slideshow ── */
.bio-meta-wrap{
  max-width:calc(var(--bio-max-width) + var(--content-pad) * 2);
  margin:0 auto;padding:0 var(--content-pad) 120px
}
.bio-credits{margin-top:44px;border-top:1px solid var(--border)}
.bio-credit{border-bottom:1px solid var(--border)}
.bio-credit summary{
  list-style:none;cursor:pointer;padding:20px 0;
  display:flex;justify-content:space-between;align-items:center;gap:20px;
  font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);font-weight:500
}
.bio-credit summary::-webkit-details-marker{display:none}
.bio-credit summary::after{content:'+';font-size:17px;line-height:1;color:var(--dim)}
.bio-credit[open] summary::after{content:'\2013'}
.bio-credit-list{list-style:none;margin:0;padding:0 0 20px}
.bio-credit-list li{font-size:17px;color:var(--mid);line-height:1.6;padding:3px 0}
.bio-credit-empty{font-size:15px;color:var(--dim);padding:0 0 20px}

/* ── CONTACT ─────────────────────────────────────────────── */
#page-contact{padding-top:0;background:var(--bg)}
.contact-wrap{padding:140px var(--content-pad) 120px;max-width:calc(var(--contact-max-width) + var(--content-pad) * 2);margin:0 auto}
.contact-header{
  font-size:var(--label-size);letter-spacing:0.3em;
  text-transform:uppercase;font-weight:500;color:var(--dim);
  padding-bottom:48px;border-bottom:1px solid var(--border);margin-bottom:72px
}
.contact-intro{
  font-size:calc(var(--body-size) * 1.2);
  line-height:1.6;color:var(--text);margin-bottom:64px;font-weight:300
}
.contact-list{list-style:none}
.contact-list li{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:22px 0;border-top:1px solid var(--border)
}
.contact-list li:last-child{border-bottom:1px solid var(--border)}
.contact-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);font-weight:500}

<script>
// ═══════════════════════════════════════════════════════════
// CSV PARSER — handles quoted fields and multiline cell text
// Standard rules: fields wrapped in "…" may contain commas
// and line breaks; "" inside quotes means a literal quote.
// ═══════════════════════════════════════════════════════════
function parseCSV(raw){
  const rows=[],n=raw.length;
  let i=0;
  while(i<n){
    // skip blank lines between rows
    while(i<n&&(raw[i]==='\r'||raw[i]==='\n'))i++;
    if(i>=n)break;
    const row=[];
    // read one row
    while(i<n){
      if(raw[i]==='\r'||raw[i]==='\n')break;
      let f='';
      if(raw[i]==='"'){
        // quoted field — newlines inside are part of the value
        i++;
        while(i<n){
          if(raw[i]==='"'&&i+1<n&&raw[i+1]==='"'){f+='"';i+=2}
          else if(raw[i]==='"'){i++;break}
          else f+=raw[i++]
        }
      }else{
        while(i<n&&raw[i]!==','&&raw[i]!=='\r'&&raw[i]!=='\n')f+=raw[i++]
      }
      row.push(f);
      if(i<n&&raw[i]===',')i++;else break;
    }
    if(row.length&&!(row.length===1&&row[0]===''))rows.push(row);
  }
  return rows;
}

// Key-value CSV (settings / bio / contact):  key , value , description
// Rows where key starts with # are comments and are ignored.
function csvKV(raw){
  const kv={};
  parseCSV(raw).slice(1).forEach(r=>{
    const k=(r[0]||'').trim();
    if(!k||k[0]==='#')return;
    kv[k]=(r[1]||'').trim();
  });
  return kv;
}

// Object-list CSV (works): first row is column headers.
// Rows where the first cell starts with # are comments.
function csvObjs(raw){
  const rows=parseCSV(raw);
  if(rows.length<2)return[];
  const hdrs=rows[0].map(h=>h.trim());
  return rows.slice(1)
    .filter(r=>r[0]&&r[0][0]!=='#')
    .map(r=>{const o={};hdrs.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});
}

async function loadCSV(name){
  const r=await fetch(name+'?_='+Date.now());
  if(!r.ok)throw new Error('Cannot load '+name+' (HTTP '+r.status+')');
  return r.text();
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
let currentPage='home';

const SITE_URL='https://muso-design.github.io/art-website';

function navigate(page,skipPush){
  if(document.getElementById('lightbox').classList.contains('open'))closeLb(true);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('main-nav').className=page==='home'?'light':'dark';
  ['works','bio','contact'].forEach(p=>{
    const el=document.getElementById('nl-'+p);
    if(el)el.classList.toggle('active',p===page);
  });
  currentPage=page;
  window.scrollTo(0,0);
  const ft=document.getElementById('site-footer');
  if(ft)ft.style.display=page==='home'?'none':'flex';
  /* Reset the nav auto-hide on every page change; footer visibility is
     decided by bottom-proximity once the new page has laid out. */
  _lastScrollY=0;_scrollAccum=0;_navHidden=false;
  document.getElementById('main-nav').classList.remove('nav-hidden');
  if(ft)ft.classList.add('footer-hidden');
  requestAnimationFrame(()=>{if(typeof _updateFooter==='function')_updateFooter();});

  /* ── Hash routing (BRIEF §Architecture) ─────────────────── */
  if(!skipPush){
    const hash=page==='home'?'':('#/'+page);
    if(location.hash!==(hash||'')&&!(page==='home'&&!location.hash))
      history.pushState(null,'',hash||location.pathname.replace(/\/$/,'')+'/');
  }

  /* ── Update meta tags per page state (BRIEF §SEO) ───────── */
  const name=document.getElementById('nav-name').textContent||'Roman Chystakhovskyi';
  const pageTitles={
    home:name+' — Sculptor',
    works:name+' — Works',
    bio:name+' — Bio',
    contact:name+' — Contact'
  };
  const pageDescs={
    home:'Portfolio of '+name+' — figurative sculptor working at the threshold of physical and digital material. Leipzig, Germany.',
    works:'Selected works by '+name+' — figurative sculpture in polymer clay and resin.',
    bio:'Biography of '+name+' — figurative sculptor trained in Kyiv, based in Leipzig.',
    contact:'Contact '+name+' for exhibition proposals, acquisition enquiries, or studio visits.'
  };
  const title=pageTitles[page]||pageTitles.home;
  const desc=pageDescs[page]||pageDescs.home;
  const pageHash=page==='home'?'':('#/'+page);
  const canonical=SITE_URL+'/'+pageHash;

  document.title=title;
  const setMeta=(id,val)=>{const el=document.getElementById(id);if(el)el.content=val};
  setMeta('og-title',title);setMeta('og-description',desc);setMeta('og-url',canonical);
  setMeta('tw-title',title);setMeta('tw-description',desc);
  const canon=document.getElementById('link-canonical');
  if(canon)canon.href=canonical;

  /* ── JSON-LD — reset to Person when not on a work detail ── */
  if(!document.getElementById('lightbox').classList.contains('open')){
    const ldEl=document.getElementById('ld-json');
    if(ldEl&&ldEl.dataset.mode!=='person'){
      /* Keep existing Person schema */
    }
  }
}

// ═══════════════════════════════════════════════════════════
// SLIDESHOW
// ═══════════════════════════════════════════════════════════
let ssIdx=0,ssSlides=[],ssTimer=null;

function buildSlideshow(s){
  const wrap=document.getElementById('slideshow');
  const dots=document.getElementById('ss-dots');
  const interval=parseInt(s.slideshow_interval||'5000')||5000;
  ssSlides=[];
  for(let n=1;s['slideshow_'+n];n++)
    ssSlides.push({img:s['slideshow_'+n],cap:s['slideshow_caption_'+n]||''});
  if(!ssSlides.length)return;
  const arrows=wrap.querySelector('.ss-arrows');
  ssSlides.forEach((sl,i)=>{
    const div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    const im=document.createElement('img');im.src=sl.img;im.alt=sl.cap;
    div.appendChild(im);
    if(sl.cap){const c=document.createElement('div');c.className='slide-caption';c.textContent=sl.cap;div.appendChild(c)}
    wrap.insertBefore(div,arrows);
    const dot=document.createElement('button');
    dot.className='ss-dot'+(i===0?' active':'');
    dot.onclick=()=>ssGo(i);
    dots.appendChild(dot);
  });
  if(interval>0&&ssSlides.length>1)ssTimer=setInterval(slideNext,interval);
}

function ssGo(i){
  document.querySelectorAll('.slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.ss-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  ssIdx=i;
}
function slideNext(){ssGo((ssIdx+1)%ssSlides.length)}
function slidePrev(){ssGo((ssIdx-1+ssSlides.length)%ssSlides.length)}

// WORKS + LIGHTBOX
// ═══════════════════════════════════════════════════════════
let works=[],lbIdx=0,_zoomImgs=[],_zoomImgIdx=0;
let _hoverSwap=true; // gallery thumbnail hover-swap (set from settings.csv)

function renderWorks(data){
  works=data.filter(w=>w.title||w.image);
  const grid=document.getElementById('works-grid');
  grid.innerHTML='';
  works.forEach((w,i)=>{
    const c=document.createElement('div');
    c.className='work-card';
    c.onclick=()=>openLb(i);
    const mainImg=(w.image||'').replace(/\\/g,'/');
    const hover=_hoverSwap?(w.hover_image||'').trim().replace(/\\/g,'/'):'';
    if(hover)c.classList.add('has-hover');
    c.innerHTML=`
      <div class="work-img-wrap">
        <img class="work-img" src="${esc(mainImg)}" alt="${esc(w.title)}" loading="lazy"
             onerror="this.classList.add('error')" width="800" height="1000">
        ${hover?`<img class="work-img-hover" src="${esc(hover)}" alt="" aria-hidden="true" loading="lazy">`:''}
      </div>
      <div class="work-info">
        <div class="work-title">${esc(w.title)}</div>
        ${w.series?`<div class="work-series">${esc(w.series)}</div>`:''}
      </div>`;
    grid.appendChild(c);
  });
}

function slugify(str){
  return(str||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function openLb(i){
  lbIdx=i;lbRender();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
  const nav=document.getElementById('main-nav');
  nav.style.zIndex='201';
  nav.className='dark';

  /* ── Hash routing: #/works/<slug> (BRIEF §Architecture) ─── */
  const w=works[i];
  const slug=w.id||slugify(w.title);
  history.pushState(null,'','#/works/'+slug);

  /* ── VisualArtwork JSON-LD (BRIEF §SEO) ─────────────────── */
  const ldEl=document.getElementById('ld-json');
  if(ldEl&&w){
    const artworkSchema={
      '@context':'https://schema.org','@type':'VisualArtwork',
      name:w.title,
      description:w.description||undefined,
      dateCreated:w.year||undefined,
      artMedium:w.material||undefined,
      artworkSurface:undefined,
      height:undefined,
      creator:{
        '@type':'Person',
        name:document.getElementById('nav-name').textContent||'Roman Chystakhovskyi'
      },
      image:w.image?SITE_URL+'/'+w.image:undefined,
      url:SITE_URL+'/#/works/'+slug
    };
    // Clean up undefined values
    Object.keys(artworkSchema).forEach(k=>{if(artworkSchema[k]===undefined)delete artworkSchema[k]});
    ldEl.textContent=JSON.stringify(artworkSchema);
    ldEl.dataset.mode='artwork';
  }
}
function closeLb(skipHash){
  if(document.getElementById('lb-zoom').classList.contains('open'))closeZoom();
  const lbEl=document.getElementById('lightbox');
  lbEl.classList.remove('open');
  lbEl.style.transform='';lbEl.style.opacity='';lbEl.style.transition='';
  document.body.style.overflow='';
  if(window._lbObs){window._lbObs.disconnect();window._lbObs=null;}
  document.getElementById('main-nav').style.zIndex='';

  if(!skipHash){
    /* Restore hash to current page */
    const hash=currentPage==='home'?'':('#/'+currentPage);
    history.pushState(null,'',hash||location.pathname.replace(/\/$/,'')+'/');
  }

  /* Restore Person JSON-LD */
  const ldEl=document.getElementById('ld-json');
  if(ldEl)ldEl.dataset.mode='person';
}
function lbStep(d){lbIdx=(lbIdx+d+works.length)%works.length;lbRender();
  /* Update hash when navigating between works */
  const w=works[lbIdx];const slug=w.id||slugify(w.title);
  history.replaceState(null,'','#/works/'+slug);
}

function lbRender(){
  const w=works[lbIdx];
  const gallery=document.getElementById('lb-gallery');
  const lb=document.getElementById('lightbox');
  gallery.innerHTML='';
  gallery.scrollTop=0;
  lb.scrollTop=0;

  // Collect every view of this piece, in order:
  //   1. image (main, also the thumbnail)
  //   2. image_2, image_3, … (numbered columns)
  //   3. more_images — a single cell holding MANY paths at once, separated
  //      by | ; or line breaks (the fast way to add a batch of photos)
  // Backslashes are normalised to forward slashes, and duplicates removed.
  const raw=[];
  if(w.image)raw.push(w.image);
  Object.keys(w)
    .filter(k=>/^image_\d+$/.test(k))
    .sort((a,b)=>parseInt(a.slice(6),10)-parseInt(b.slice(6),10))
    .forEach(k=>raw.push(w[k]));
  if(w.more_images)w.more_images.split(/[|;\n\r]+/).forEach(s=>raw.push(s));
  const seen=new Set(),srcs=[];
  raw.forEach(s=>{
    s=(s||'').trim().replace(/\\/g,'/');
    if(!s)return;
    const key=s.toLowerCase();
    if(seen.has(key))return;
    seen.add(key);srcs.push(s);
  });
  if(!srcs.length)srcs.push((w.image||'').replace(/\\/g,'/'));

  _zoomImgs=[];
  const imgs=[];
  srcs.forEach((src,i)=>{
    const fig=document.createElement('figure');
    const img=document.createElement('img');
    img.src=src;
    const altText=w.title+(i>0?' — view '+(i+1):'');
    img.alt=altText;
    _zoomImgs.push({src:src,alt:altText});
    img.className='lb-gallery-img';
    img.dataset.idx=String(i);
    img.loading=i===0?'eager':'lazy';
    img.onerror=function(){this.classList.add('error')};
    const imgIdx=i;img.onclick=()=>openZoom(imgIdx);
    fig.appendChild(img);
    gallery.appendChild(fig);
    imgs.push(img);
  });

  // Dots — one per view; hidden entirely when a piece has just one photo
  const dotsEl=document.getElementById('lb-dots');
  dotsEl.innerHTML='';
  dotsEl.style.display=srcs.length>1?'':'none';
  if(srcs.length>1){
    srcs.forEach((src,i)=>{
      const dot=document.createElement('button');
      dot.className='lb-dot'+(i===0?' on':'');
      dot.setAttribute('aria-label','View '+(i+1));
      const idx=i;
      dot.onclick=()=>imgs[idx].scrollIntoView({behavior:'smooth',block:'center'});
      dotsEl.appendChild(dot);
    });
  }

  // Scroll-aware dot highlighting
  if(window._lbObs)window._lbObs.disconnect();
  const dots=dotsEl.querySelectorAll('.lb-dot');
  window._lbObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const i=parseInt(e.target.dataset.idx);
        dots.forEach((d,j)=>d.classList.toggle('on',j===i));
      }
    });
  },{root:gallery,threshold:0.5});
  imgs.forEach(img=>window._lbObs.observe(img));

  // Prev/next arrows — only show when there are multiple works
  const lbPrev=document.getElementById('lb-prev'),lbNext=document.getElementById('lb-next');
  if(lbPrev)lbPrev.style.display=works.length>1?'':'none';
  if(lbNext)lbNext.style.display=works.length>1?'':'none';

  // Info panel
  document.getElementById('lb-title').textContent=w.title;
  document.getElementById('lb-desc').textContent=w.description||'';
  document.getElementById('lb-desc').style.display=w.description?'block':'none';

  // Series with label
  const meta=document.getElementById('lb-meta');meta.innerHTML='';
  if(w.series)meta.innerHTML=`<dt>Series</dt><dd>${esc(w.series)}</dd>`;

  // Compact unlabeled values: year · material · dimensions · availability
  const compact=document.getElementById('lb-compact');
  const vals=[w.year,w.material,w.dimensions,w.available].filter(Boolean);
  compact.innerHTML=vals.map(v=>`<span>${esc(v)}</span>`).join('<br>');
  compact.style.display=vals.length?'block':'none';
}

let _lbZoomLevel=2.5;
const _zoom={zoomed:false,scale:0,tx:0,ty:0,dragging:false,startX:0,startY:0,lx:0,ly:0,didDrag:false,
  swipeReady:false,swipeDir:0,swipeOffset:0,swipeNextIdx:-1,
  pinch:false,pinchDist:0,pinchStartScale:1,
  vx:0,vy:0,animFrame:null,rawTx:0,rawTy:0};

function applyZoomTransform(){
  const s=_zoom.zoomed?(_zoom.scale||_lbZoomLevel):1;
  document.getElementById('lb-zoom-img').style.transform=
    `translate(${_zoom.tx}px,${_zoom.ty}px) scale(${s})`;
  if(_zoom.swipeReady){
    const img2=document.getElementById('lb-zoom-img2');
    if(img2)img2.style.transform=
      `translate(-50%,-50%) translateX(${_zoom.swipeOffset+_zoom.tx}px)`;
  }
}

function openZoom(idx){
  _zoomImgIdx=idx;
  _zoom.zoomed=false;_zoom.scale=0;_zoom.tx=0;_zoom.ty=0;
  _zoom.swipeReady=false;_zoom.swipeDir=0;_zoom.swipeOffset=0;_zoom.swipeNextIdx=-1;
  _zoom.pinch=false;_zoom.pinchDist=0;
  const img=document.getElementById('lb-zoom-img');
  const img2=document.getElementById('lb-zoom-img2');
  const d=_zoomImgs[_zoomImgIdx]||{src:'',alt:''};
  img.src=d.src;img.alt=d.alt;img.style.transition='';
  img2.style.visibility='hidden';img2.style.transition='';
  img2.style.transform='translate(-50%,-50%) translateX(100vw)';
  applyZoomTransform();
  document.getElementById('lb-zoom').classList.add('open');
  document.getElementById('main-nav').style.display='none';
  _updateZoomNav();
  initZoomInteraction();
}

function closeZoom(){
  cleanupZoomInteraction();
  document.getElementById('lb-zoom').classList.remove('open');
  document.getElementById('main-nav').style.display='';
}

function _updateZoomNav(){
  const prev=document.getElementById('lb-zoom-prev');
  const next=document.getElementById('lb-zoom-next');
  const show=!_zoom.zoomed&&_zoomImgs.length>1;
  if(prev){prev.style.display=show?'':'none';prev.disabled=(_zoomImgIdx===0);}
  if(next){next.style.display=show?'':'none';next.disabled=(_zoomImgIdx===_zoomImgs.length-1);}
}
function prevZoomImg(){if(_zoomImgIdx>0)_goToZoomImg(_zoomImgIdx-1,true);}
function nextZoomImg(){if(_zoomImgIdx<_zoomImgs.length-1)_goToZoomImg(_zoomImgIdx+1,true);}

function _goToZoomImg(idx,animated){
  if(idx<0||idx>=_zoomImgs.length)return;
  const img1=document.getElementById('lb-zoom-img');
  if(animated){
    const dir=idx>_zoomImgIdx?-1:1; // -1=slide left(next), +1=slide right(prev)
    const img2=document.getElementById('lb-zoom-img2');
    const d=_zoomImgs[idx]||{src:'',alt:''};
    img2.src=d.src;img2.alt=d.alt;
    // Pre-position img2 off-screen opposite side, no transition
    img2.style.transition='';
    img2.style.transform=`translate(-50%,-50%) translateX(${-dir*window.innerWidth}px)`;
    img2.style.visibility='visible';
    img2.offsetHeight; // force reflow so initial position is painted
    // Animate both
    img1.style.transition='transform 0.32s ease';
    img2.style.transition='transform 0.32s ease';
    _zoom.tx=dir*window.innerWidth;
    applyZoomTransform(); // img1 slides out
    img2.style.transform='translate(-50%,-50%) translateX(0)'; // img2 slides in
    setTimeout(()=>{
      img1.style.transition='';img2.style.transition='';
      img2.style.visibility='hidden';
      img2.style.transform='translate(-50%,-50%) translateX(100vw)';
      _zoomImgIdx=idx;
      const nd=_zoomImgs[idx]||{src:'',alt:''};
      img1.src=nd.src;img1.alt=nd.alt;
      _zoom.tx=0;applyZoomTransform();
      _updateZoomNav();_syncGalleryScroll();
    },320);
  }else{
    _zoomImgIdx=idx;
    const d=_zoomImgs[idx]||{src:'',alt:''};
    img1.src=d.src;img1.alt=d.alt;
    _zoom.tx=0;applyZoomTransform();
    _updateZoomNav();_syncGalleryScroll();
  }
}
function _setupSwipe(tx){
  const dir=tx>0?1:-1; // +1=dragging right(prev), -1=dragging left(next)
  const nextIdx=_zoomImgIdx+(-dir); // prev or next index
  if(nextIdx<0||nextIdx>=_zoomImgs.length)return;
  const img2=document.getElementById('lb-zoom-img2');
  const d=_zoomImgs[nextIdx]||{src:'',alt:''};
  img2.src=d.src;img2.alt=d.alt;
  img2.style.transition='';
  img2.style.visibility='visible';
  _zoom.swipeDir=dir;
  _zoom.swipeOffset=-dir*window.innerWidth;
  _zoom.swipeNextIdx=nextIdx;
  _zoom.swipeReady=true;
  img2.style.transform=`translate(-50%,-50%) translateX(${_zoom.swipeOffset+_zoom.tx}px)`;
}
function _commitSwipe(){
  const img1=document.getElementById('lb-zoom-img');
  const img2=document.getElementById('lb-zoom-img2');
  img1.style.transition='transform 0.32s ease';
  img2.style.transition='transform 0.32s ease';
  _zoom.tx=_zoom.swipeDir*window.innerWidth; // img1 exits; img2 math lands at 0
  applyZoomTransform();
  const newIdx=_zoom.swipeNextIdx;
  setTimeout(()=>{
    img1.style.transition='';img2.style.transition='';
    img2.style.visibility='hidden';
    img2.style.transform='translate(-50%,-50%) translateX(100vw)';
    const d=_zoomImgs[newIdx]||{src:'',alt:''};
    img1.src=d.src;img1.alt=d.alt;
    _zoom.tx=0;_zoom.swipeReady=false;_zoom.swipeDir=0;_zoom.swipeNextIdx=-1;
    applyZoomTransform();
    _zoomImgIdx=newIdx;
    _updateZoomNav();_syncGalleryScroll();
  },320);
}
function _syncGalleryScroll(){
  const gallery=document.getElementById('lb-gallery');
  const imgs=gallery?gallery.querySelectorAll('.lb-gallery-img'):[];
  if(imgs[_zoomImgIdx])imgs[_zoomImgIdx].scrollIntoView({behavior:'smooth',block:'center'});
}
// ── PAN PHYSICS (rubber-band overscroll + spring-magnet settle) ───────────────
// Passepartout: a generous, responsive "mat" the zoomed image can drift into
// before the magnet engages. Bigger = looser boundary. Scales with the smaller
// viewport dimension and is clamped to a sensible range.
function _panGap(){
  const m=Math.min(window.innerWidth,window.innerHeight);
  return Math.max(56,Math.min(220,m*0.18));
}
// Allowed translation range. When the image is larger than the viewport it can
// travel until its leading edge sits exactly _panGap() inside the screen edge.
function _panBounds(){
  const r=document.getElementById('lb-zoom-img').getBoundingClientRect();
  const vW=window.innerWidth,vH=window.innerHeight,G=_panGap();
  const Hx=r.width/2-vW/2,Hy=r.height/2-vH/2;
  return{
    minX:Hx>0?-(Hx+G):0,maxX:Hx>0?(Hx+G):0,
    minY:Hy>0?-(Hy+G):0,maxY:Hy>0?(Hy+G):0
  };
}
// iOS-style diminishing-resistance rubber band: the further you pull past the
// bound, the harder it resists — so there is "luft" but it never runs away.
function _rubberOver(over,dim){const c=0.55;return(over*dim*c)/(dim+c*over);}
function _rubber(x,min,max,dim){
  if(x<min)return min-_rubberOver(min-x,dim);
  if(x>max)return max+_rubberOver(x-max,dim);
  return x;
}
// Called on every pointer-move while zoomed: track the raw (unconstrained)
// finger position, then display a rubber-banded version of it.
function panDrag(dx,dy){
  _zoom.rawTx+=dx;_zoom.rawTy+=dy;
  const b=_panBounds(),vW=window.innerWidth,vH=window.innerHeight;
  _zoom.tx=_rubber(_zoom.rawTx,b.minX,b.maxX,vW);
  _zoom.ty=_rubber(_zoom.rawTy,b.minY,b.maxY,vH);
  applyZoomTransform();
}
function _stopSettle(){
  if(_zoom.animFrame){cancelAnimationFrame(_zoom.animFrame);_zoom.animFrame=null;}
  _zoom.vx=0;_zoom.vy=0;
}
// Release physics. Two regimes per axis:
//   • In bounds  → momentum glide with friction.
//   • Out of bounds (in the passepartout) → ease gently toward the NEAREST
//     edge while bleeding off velocity, so it never slingshots across to the
//     far side. This gives a soft magnetic snap, not a violent recoil.
function _settle(){
  _stopSettle();
  const friction=0.90,  // momentum decay while inside the bounds
        RETURN=0.16,     // how briskly it eases back from the passepartout
        VBLEED=0.5;      // kills inherited drag velocity while returning
  const tick=()=>{
    if(!_zoom.zoomed){_zoom.animFrame=null;return;}
    const b=_panBounds();
    // ── X axis ──
    if(_zoom.tx<b.minX||_zoom.tx>b.maxX){
      const target=_zoom.tx<b.minX?b.minX:b.maxX;
      _zoom.tx+=(target-_zoom.tx)*RETURN;
      _zoom.vx*=VBLEED;
      if(Math.abs(target-_zoom.tx)<0.5){_zoom.tx=target;_zoom.vx=0;}
    }else{
      _zoom.tx+=_zoom.vx;_zoom.vx*=friction;
    }
    // ── Y axis ──
    if(_zoom.ty<b.minY||_zoom.ty>b.maxY){
      const target=_zoom.ty<b.minY?b.minY:b.maxY;
      _zoom.ty+=(target-_zoom.ty)*RETURN;
      _zoom.vy*=VBLEED;
      if(Math.abs(target-_zoom.ty)<0.5){_zoom.ty=target;_zoom.vy=0;}
    }else{
      _zoom.ty+=_zoom.vy;_zoom.vy*=friction;
    }
    applyZoomTransform();
    const inX=_zoom.tx>=b.minX-0.5&&_zoom.tx<=b.maxX+0.5;
    const inY=_zoom.ty>=b.minY-0.5&&_zoom.ty<=b.maxY+0.5;
    if(inX&&inY&&Math.abs(_zoom.vx)<0.3&&Math.abs(_zoom.vy)<0.3){
      _zoom.tx=Math.max(b.minX,Math.min(b.maxX,_zoom.tx));
      _zoom.ty=Math.max(b.minY,Math.min(b.maxY,_zoom.ty));
      applyZoomTransform();
      _zoom.vx=0;_zoom.vy=0;_zoom.animFrame=null;return;
    }
    _zoom.animFrame=requestAnimationFrame(tick);
  };
  _zoom.animFrame=requestAnimationFrame(tick);
}

function initZoomInteraction(){
  const wrap=document.getElementById('lb-zoom-wrap');
  const overlay=document.getElementById('lb-zoom');
  wrap.style.cursor='zoom-in';

  function onImg(cx,cy){
    const r=document.getElementById('lb-zoom-img').getBoundingClientRect();
    return cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
  }

  // ── Smooth zoom-in: compute clamped target, reset to identity, animate in ──
  function doZoomIn(clientX,clientY){
    const img=document.getElementById('lb-zoom-img');
    const r=overlay.getBoundingClientRect();
    const cx=clientX-r.left-r.width/2,cy=clientY-r.top-r.height/2;
    _zoom.scale=_lbZoomLevel;
    _zoom.tx=cx*(1-_lbZoomLevel);_zoom.ty=cy*(1-_lbZoomLevel);
    _zoom.zoomed=true;
    img.style.transition='none';
    applyZoomTransform();
    const r2=img.getBoundingClientRect(),vW=window.innerWidth,vH=window.innerHeight;
    if(r2.width>=vW){if(r2.left>0)_zoom.tx-=r2.left;else if(r2.right<vW)_zoom.tx+=vW-r2.right;}else _zoom.tx=0;
    if(r2.height>=vH){if(r2.top>0)_zoom.ty-=r2.top;else if(r2.bottom<vH)_zoom.ty+=vH-r2.bottom;}else _zoom.ty=0;
    const ftx=_zoom.tx,fty=_zoom.ty;
    // Reset to identity, then animate to clamped target
    _zoom.zoomed=false;_zoom.scale=0;_zoom.tx=0;_zoom.ty=0;
    applyZoomTransform();
    img.offsetWidth; // force reflow so transition fires from identity
    img.style.transition='transform 0.34s cubic-bezier(0.25,0.46,0.45,0.94)';
    _zoom.tx=ftx;_zoom.ty=fty;_zoom.zoomed=true;_zoom.scale=_lbZoomLevel;
    _zoom.rawTx=ftx;_zoom.rawTy=fty;
    applyZoomTransform();
    setTimeout(()=>{img.style.transition=''},340);
    wrap.style.cursor='grab';_updateZoomNav();
  }
  function doZoomOut(){
    _stopSettle();
    const img=document.getElementById('lb-zoom-img');
    img.style.transition='transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94)';
    _zoom.zoomed=false;_zoom.scale=0;_zoom.tx=0;_zoom.ty=0;
    applyZoomTransform();
    setTimeout(()=>img.style.transition='',280);
    wrap.style.cursor='zoom-in';_updateZoomNav();
  }
  function snapBack(){
    const img=document.getElementById('lb-zoom-img');
    img.style.transition='transform 0.25s ease';
    _zoom.tx=0;applyZoomTransform();
    if(_zoom.swipeReady){
      const img2=document.getElementById('lb-zoom-img2');
      img2.style.transition='transform 0.25s ease';
      setTimeout(()=>{
        img.style.transition='';img2.style.transition='';
        img2.style.visibility='hidden';
        _zoom.swipeReady=false;_zoom.swipeDir=0;_zoom.swipeNextIdx=-1;
      },250);
    }else{setTimeout(()=>img.style.transition='',250);}
  }

  // ── Mouse ─────────────────────────────────────────────────────────────────
  wrap._md=e=>{
    if(e.button!==0)return;
    _stopSettle();
    _zoom.dragging=true;_zoom.didDrag=false;
    _zoom.startX=_zoom.lx=e.clientX;_zoom.startY=_zoom.ly=e.clientY;
    _zoom.vx=0;_zoom.vy=0;
    _zoom.rawTx=_zoom.tx;_zoom.rawTy=_zoom.ty;
  };
  wrap._mm=e=>{
    if(!_zoom.dragging)return;
    const dx=e.clientX-_zoom.lx,dy=e.clientY-_zoom.ly;
    if(Math.abs(e.clientX-_zoom.startX)>5||Math.abs(e.clientY-_zoom.startY)>5)_zoom.didDrag=true;
    if(_zoom.zoomed){
      _zoom.vx=dx;_zoom.vy=dy;
      panDrag(dx,dy);
      wrap.style.cursor='grabbing';
    }else{
      _zoom.tx=e.clientX-_zoom.startX;
      if(!_zoom.swipeReady&&Math.abs(_zoom.tx)>15)_setupSwipe(_zoom.tx);
      applyZoomTransform();
    }
    _zoom.lx=e.clientX;_zoom.ly=e.clientY;
  };
  wrap._mu=e=>{
    if(!_zoom.dragging)return;
    _zoom.dragging=false;
    const dx=e.clientX-_zoom.startX;
    if(_zoom.didDrag&&!_zoom.zoomed){
      Math.abs(dx)>60&&_zoom.swipeReady?_commitSwipe():snapBack();
      return;
    }
    if(!_zoom.didDrag){
      if(_zoom.zoomed){doZoomOut();}
      else if(onImg(e.clientX,e.clientY)){doZoomIn(e.clientX,e.clientY);}
      else{closeZoom();}
    }else if(_zoom.zoomed){
      wrap.style.cursor='grab';
      _settle();
    }
  };
  wrap.addEventListener('mousedown',wrap._md);
  document.addEventListener('mousemove',wrap._mm);
  document.addEventListener('mouseup',wrap._mu);

  // ── Touch (single-finger swipe/pan + two-finger pinch-zoom) ──────────────
  function _pd(e){return Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY)}
  wrap._ts=e=>{
    e.preventDefault();
    if(e.touches.length===2){
      _stopSettle();
      _zoom.pinch=true;_zoom.dragging=false;_zoom.didDrag=false;
      if(_zoom.swipeReady)snapBack();
      _zoom.pinchDist=_pd(e);
      _zoom.pinchStartScale=_zoom.zoomed?(_zoom.scale||_lbZoomLevel):1;
      return;
    }
    if(e.touches.length===1&&!_zoom.pinch){
      _stopSettle();
      _zoom.dragging=true;_zoom.didDrag=false;
      _zoom.startX=_zoom.lx=e.touches[0].clientX;_zoom.startY=_zoom.ly=e.touches[0].clientY;
      _zoom.vx=0;_zoom.vy=0;
      _zoom.rawTx=_zoom.tx;_zoom.rawTy=_zoom.ty;
    }
  };
  wrap._tm=e=>{
    e.preventDefault();
    if(e.touches.length===2&&_zoom.pinch){
      const d=_pd(e);
      const newScale=Math.max(1,Math.min(6,_zoom.pinchStartScale*(d/_zoom.pinchDist)));
      if(newScale>1.12){
        if(!_zoom.zoomed){
          const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
          const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
          const r=overlay.getBoundingClientRect();
          _zoom.tx=(cx-r.left-r.width/2)*(1-newScale);
          _zoom.ty=(cy-r.top-r.height/2)*(1-newScale);
          _zoom.zoomed=true;
        }
        _zoom.scale=newScale;
      }else{
        _zoom.zoomed=false;_zoom.scale=0;_zoom.tx=0;_zoom.ty=0;
      }
      applyZoomTransform();_updateZoomNav();
      wrap.style.cursor=_zoom.zoomed?'grab':'zoom-in';
      return;
    }
    if(e.touches.length===1&&_zoom.dragging&&!_zoom.pinch){
      const tx=e.touches[0].clientX,ty=e.touches[0].clientY;
      const dx=tx-_zoom.lx,dy=ty-_zoom.ly;
      if(Math.abs(tx-_zoom.startX)>5||Math.abs(ty-_zoom.startY)>5)_zoom.didDrag=true;
      if(_zoom.zoomed){
        _zoom.vx=dx;_zoom.vy=dy;
        panDrag(dx,dy);
      }else{
        _zoom.tx=tx-_zoom.startX;
        if(!_zoom.swipeReady&&Math.abs(_zoom.tx)>15)_setupSwipe(_zoom.tx);
        applyZoomTransform();
      }
      _zoom.lx=tx;_zoom.ly=ty;
    }
  };
  wrap._te=e=>{
    if(e.touches.length<2&&_zoom.pinch){
      _zoom.pinch=false;
      if(!_zoom.zoomed){_zoom.scale=0;_zoom.tx=0;_zoom.ty=0;applyZoomTransform();}
      else if((_zoom.scale||0)<1.25){doZoomOut();} // tiny pinch → glide back to 1×, no bounce
      else{_zoom.rawTx=_zoom.tx;_zoom.rawTy=_zoom.ty;_settle();}
      return;
    }
    if(_zoom.pinch)return;
    if(e.changedTouches.length===1&&_zoom.dragging){
      _zoom.dragging=false;
      const t=e.changedTouches[0],dx=t.clientX-_zoom.startX;
      if(_zoom.didDrag&&!_zoom.zoomed){
        Math.abs(dx)>60&&_zoom.swipeReady?_commitSwipe():snapBack();
        return;
      }
      if(!_zoom.didDrag){
        if(_zoom.zoomed){doZoomOut();}
        else if(onImg(t.clientX,t.clientY)){doZoomIn(t.clientX,t.clientY);}
        else{closeZoom();}
      }else if(_zoom.zoomed){
        _settle();
      }
    }
  };
  wrap.addEventListener('touchstart',wrap._ts,{passive:false});
  wrap.addEventListener('touchmove',wrap._tm,{passive:false});
  wrap.addEventListener('touchend',wrap._te);
}

function cleanupZoomInteraction(){
  const wrap=document.getElementById('lb-zoom-wrap');
  if(!wrap)return;
  if(wrap._md)wrap.removeEventListener('mousedown',wrap._md);
  if(wrap._mm)document.removeEventListener('mousemove',wrap._mm);
  if(wrap._mu)document.removeEventListener('mouseup',wrap._mu);
  if(wrap._ts)wrap.removeEventListener('touchstart',wrap._ts);
  if(wrap._tm)wrap.removeEventListener('touchmove',wrap._tm);
  if(wrap._te)wrap.removeEventListener('touchend',wrap._te);
  if(_zoom.animFrame){cancelAnimationFrame(_zoom.animFrame);_zoom.animFrame=null;}
  _zoom.dragging=false;_zoom.pinch=false;_zoom.vx=0;_zoom.vy=0;wrap.style.cursor='';
}

// ═══════════════════════════════════════════════════════════
// BIO
// ═══════════════════════════════════════════════════════════
function renderBio(bio,s){
  // ── Paragraphs ──────────────────────────────────────────────────
  const paras=[];
  for(let i=1;bio['bio_'+i];i++)paras.push(bio['bio_'+i]);

  // ── Flexible images (placement / ratio / rotation / width / caption) ──
  const PLACEMENTS=['full','wide','center','left','right'];
  const imgs=[];
  for(let i=1;bio['image_'+i];i++){
    let pl=(bio['image_'+i+'_placement']||'full').toLowerCase().trim();
    if(!PLACEMENTS.includes(pl))pl='full';
    imgs.push({
      src:bio['image_'+i],
      placement:pl,
      ratio:(bio['image_'+i+'_ratio']||'').trim(),
      rotation:parseFloat(bio['image_'+i+'_rotation']||'0')||0,
      width:(bio['image_'+i+'_width']||'').trim(),
      caption:(bio['image_'+i+'_caption']||'').trim(),
      after:(bio['image_'+i+'_after']||'').toString().toLowerCase().trim()
    });
  }
  // Legacy fallback: a single `photo` key becomes a right-floated image
  if(!imgs.length&&bio.photo)
    imgs.push({src:bio.photo,placement:'right',ratio:'',rotation:0,width:'',caption:'',after:'1'});

  // Resolve each image's insertion point (0 = before first paragraph,
  // N = after paragraph N, blank/"bottom" = after the last paragraph)
  function pos(im){
    if(im.after==='top'||im.after==='0')return 0;
    if(im.after===''||im.after==='bottom')return paras.length;
    const n=parseInt(im.after,10);
    return isNaN(n)?paras.length:Math.max(0,Math.min(paras.length,n));
  }
  function figHTML(im){
    const style=[];
    if(im.rotation)style.push('transform:rotate('+im.rotation+'deg)');
    if(im.width)style.push('--fig-w:'+im.width);
    const imgStyle=im.ratio?` style="aspect-ratio:${esc(im.ratio)}"`:'';
    const cap=im.caption?`<figcaption>${esc(im.caption)}</figcaption>`:'';
    return `<figure class="bio-fig bio-fig--${im.placement}"`+
      `${style.length?` style="${esc(style.join(';'))}"`:''}>`+
      `<div class="bio-fig-inner"><img src="${esc(im.src)}" `+
      `alt="${esc(im.caption||(s&&s.site_name)||'Roman Chystakhovskyi')}" loading="lazy" `+
      `onerror="var f=this.closest('.bio-fig');if(f)f.style.display='none'"${imgStyle}></div>`+
      cap+`</figure>`;
  }

  let html='';
  for(let p=0;p<=paras.length;p++){
    imgs.filter(im=>pos(im)===p).forEach(im=>{html+=figHTML(im)});
    if(p<paras.length)html+=`<p>${paras[p]}</p>`;
  }
  document.getElementById('bio-text').innerHTML=html;

  const oldPhoto=document.getElementById('bio-photo');
  if(oldPhoto)oldPhoto.style.display='none';

  // ── Facts (born / based / materials) ────────────────────────────
  let det='';
  for(let i=1;bio['detail_label_'+i];i++)
    det+=`<div><dt>${esc(bio['detail_label_'+i])}</dt><dd>${esc(bio['detail_value_'+i]||'')}</dd></div>`;
  document.getElementById('bio-details').innerHTML=det;

  // ── Collapsible credits: Exhibitions / Collections ──────────────
  // A dropdown is shown for each group whose *_heading is set in bio.csv
  // (clear the heading to hide it). Items: exhibition_N / collection_N.
  function creditGroup(heading,items){
    if(!heading)return'';
    const body=items.length
      ? `<ul class="bio-credit-list">${items.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>`
      : `<div class="bio-credit-empty">None at this time.</div>`;
    return `<details class="bio-credit"${items.length?' open':''}><summary>${esc(heading)}</summary>${body}</details>`;
  }
  function collect(prefix){
    const re=new RegExp('^'+prefix+'\\d+$');
    return Object.keys(bio).filter(k=>re.test(k))
      .sort((a,b)=>parseInt(a.slice(prefix.length),10)-parseInt(b.slice(prefix.length),10))
      .map(k=>(bio[k]||'').trim()).filter(Boolean);
  }
  const credits=document.getElementById('bio-credits');
  if(credits){
    const html=
      creditGroup((bio.exhibitions_heading||'').trim(),collect('exhibition_'))+
      creditGroup((bio.collections_heading||'').trim(),collect('collection_'));
    credits.innerHTML=html;
    credits.style.display=html?'':'none';
  }

  renderProcess(bio);
}

// ═══════════════════════════════════════════════════════════
// PROCESS / STUDIO SLIDESHOW (below the bio)
// Images come from bio.csv. Two ways to add them, mix freely:
//   • process_1, process_2, …  (optional process_caption_N each)
//   • process_images           (MANY paths in one cell, | or newline separated)
// Reorder by simply rearranging the rows / the list. Swipe on mobile,
// arrow buttons on desktop.
// ═══════════════════════════════════════════════════════════
function renderProcess(bio){
  const wrap=document.getElementById('bio-process');
  if(!wrap)return;
  const items=[];
  for(let i=1;bio['process_'+i];i++){
    const src=(bio['process_'+i]||'').trim().replace(/\\/g,'/');
    if(src)items.push({src,cap:(bio['process_caption_'+i]||'').trim()});
  }
  if(bio.process_images){
    bio.process_images.split(/[|;\n\r]+/).forEach(s=>{
      s=(s||'').trim().replace(/\\/g,'/');
      if(s)items.push({src:s,cap:''});
    });
  }
  if(!items.length){wrap.style.display='none';wrap.innerHTML='';return;}
  wrap.style.display='';
  const heading=(bio.process_heading||'Studio').trim();
  const multi=items.length>1;
  const slides=items.map((it,i)=>
    `<div class="studio-slide" data-idx="${i}">`+
    `<img src="${esc(it.src)}" alt="${esc(it.cap||heading+' '+(i+1))}" `+
    `loading="${i===0?'eager':'lazy'}" `+
    `onerror="var s=this.closest('.studio-slide');if(s)s.style.visibility='hidden'"></div>`).join('');
  const arrows=multi
    ? `<button class="studio-arrow studio-prev" type="button" aria-label="Previous">&lt;</button>`+
      `<button class="studio-arrow studio-next" type="button" aria-label="Next">&gt;</button>`
    : '';
  const dots=multi
    ? `<div class="studio-dots">`+items.map((it,i)=>
        `<button class="studio-dot${i===0?' on':''}" type="button" data-idx="${i}" aria-label="Photo ${i+1}"></button>`).join('')+`</div>`
    : '';
  wrap.innerHTML=
    `<div class="process-head"><span class="process-title">${esc(heading)}</span></div>`+
    `<div class="studio-stage"><div class="studio-track" id="studio-track">${slides}</div>${arrows}</div>`+
    dots+
    `<div class="studio-caption" id="studio-caption"></div>`;

  const n=items.length;
  const track=wrap.querySelector('#studio-track');
  const dotEls=[...wrap.querySelectorAll('.studio-dot')];
  const capEl=wrap.querySelector('#studio-caption');
  function current(){return track.clientWidth?Math.round(track.scrollLeft/track.clientWidth):0;}
  function update(){
    const i=Math.max(0,Math.min(n-1,current()));
    dotEls.forEach((d,j)=>d.classList.toggle('on',j===i));
    if(capEl)capEl.textContent=(items[i]&&items[i].cap)||'';
  }
  function goTo(i){
    i=Math.max(0,Math.min(n-1,i));
    track.scrollTo({left:i*track.clientWidth,behavior:'smooth'});
  }
  let raf=false;
  track.addEventListener('scroll',()=>{
    if(!raf){raf=true;requestAnimationFrame(()=>{raf=false;update();});}
  },{passive:true});
  dotEls.forEach((d,i)=>d.onclick=()=>goTo(i));
  const prev=wrap.querySelector('.studio-prev'),next=wrap.querySelector('.studio-next');
  if(prev)prev.onclick=()=>goTo(current()-1);
  if(next)next.onclick=()=>goTo(current()+1);
  update();
}

function renderContact(c,s){
  document.getElementById('contact-intro').textContent=c.intro||'';
  const list=document.getElementById('contact-list');list.innerHTML='';
  for(let i=1;c['item_label_'+i];i++){
    const label=c['item_label_'+i],val=c['item_value_'+i]||'',link=c['item_link_'+i]||'';
    list.innerHTML+=`<li>
      <span class="contact-label">${esc(label)}</span>
      <span class="contact-value">${link?`<a href="${esc(link)}">${esc(val)}</a>`:esc(val)}</span>
    </li>`;
  }

  // ── Newsletter (only renders once you paste your provider's form URL) ──
  // Posts straight to your email service (Buttondown / Mailchimp / EmailOctopus
  // …) — no backend here. Use a provider with DOUBLE OPT-IN for GDPR.
  const nl=document.getElementById('newsletter');
  if(nl){
    const action=(s&&s.newsletter_action||'').trim();
    if(!action){nl.style.display='none';nl.innerHTML='';}
    else{
      nl.style.display='';
      const heading=esc((s.newsletter_heading||'Newsletter').trim());
      const note=(s.newsletter_note||'').trim();
      const btn=esc((s.newsletter_button||'Subscribe').trim());
      const field=esc((s.newsletter_email_field||'email').trim());
      const consent=(s.newsletter_consent||
        'By subscribing you agree your email is processed by our newsletter provider. See the privacy policy.').trim();
      nl.innerHTML=
        `<div class="newsletter-heading">${heading}</div>`+
        (note?`<p class="newsletter-note">${esc(note)}</p>`:'')+
        `<form class="newsletter-form" action="${esc(action)}" method="post" target="_blank" rel="noopener">`+
        `<input type="email" name="${field}" required autocomplete="email" placeholder="your@email.com" aria-label="Email address">`+
        `<button type="submit">${btn}</button>`+
        `</form>`+
        `<p class="newsletter-consent">${esc(consent)} <a href="datenschutz.html">Datenschutz</a></p>`;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// APPLY SETTINGS → CSS VARIABLES + TITLE
// ═══════════════════════════════════════════════════════════
function applySettings(s){
  /* Build CSS variable declarations from settings.csv values */
  const parts=[];
  const v=(cssVar,key)=>{if(s[key])parts.push(cssVar+':'+s[key])};
  v('--bg','color_background');
  v('--bg2','color_surface');
  v('--bg3','color_surface_hover');
  v('--text','color_text');
  v('--mid','color_text_mid');
  v('--dim','color_text_dim');
  v('--border','color_border');
  v('--font','font_family');
  v('--body-size','font_size_body');
  v('--body-lh','line_height_body');
  v('--nav-name-size','font_size_nav_name');
  v('--nav-link-size','font_size_nav_links');
  v('--grid-title-size','font_size_grid_title');
  v('--grid-series-size','font_size_grid_series');
  v('--lb-title-size','font_size_lightbox_title');
  v('--lb-meta-size','font_size_lightbox_meta');
  v('--page-padding','spacing_page_padding');
  v('--grid-gap','spacing_grid_gap');
  v('--nav-v-pad','spacing_nav_padding');
  v('--footer-v-pad','spacing_footer_padding');
  v('--grid-max-width','grid_max_width');
  v('--grid-img-ratio','grid_image_ratio');
  v('--lb-img-width','lightbox_image_width');
  v('--lb-img-max','lightbox_image_max_width');
  v('--lb-gallery-gap','lightbox_gallery_gap');
  v('--lb-dots-offset','lightbox_dots_offset');
  v('--lb-panel-offset','lightbox_panel_offset');
  v('--lb-panel-width','lightbox_panel_width');
  v('--bio-max-width','bio_max_width');
  v('--studio-max-width','studio_max_width');
  v('--studio-ratio','studio_ratio');

  /* Gallery thumbnail hover-swap toggle (default on) */
  _hoverSwap=!['no','off','false','0'].includes(String(s.gallery_hover_swap||'').toLowerCase().trim());
  v('--contact-max-width','contact_max_width');
  v('--content-pad','spacing_content_padding');
  v('--ss-gradient-height','slideshow_gradient_height');
  v('--ss-gradient-opacity','slideshow_gradient_opacity');
  v('--slide-transition','slideshow_fade_duration');
  /* KEY FIX: inject as a <style> block (not inline style on :root).
     Inline styles beat every media-query rule — that's why the old code
     made the site look broken on phones despite the responsive CSS.
     By inserting this block BEFORE <style id="responsive">, the media
     queries in that block win by CSS source order on small screens.        */
  const st=document.createElement('style');
  st.id='site-settings';
  st.textContent=':root{'+parts.join(';')+'}';
  const rsp=document.getElementById('responsive');
  rsp?document.head.insertBefore(st,rsp):document.head.appendChild(st);

  if(s.lightbox_zoom_level)_lbZoomLevel=parseFloat(s.lightbox_zoom_level)||2.5;

  /* BRIEF §Legal — no Google Fonts CDN requests (GDPR violation in DE).
     Self-hosted fonts are declared via @font-face in the stylesheet.
     Only load font_url if it is NOT a Google Fonts URL.                   */
  if(s.font_url && !s.font_url.includes('googleapis.com') && !s.font_url.includes('fonts.google')){
    const l=document.createElement('link');l.rel='stylesheet';l.href=s.font_url;
    document.head.appendChild(l);
  }

  const name=s.site_name||'Roman Chystakhovskyi';
  const role=s.site_role||'Sculptor';
  const siteTitle=name+' — '+role;

  /* Update static meta tags with dynamic values from settings.csv */
  document.title=siteTitle;
  const desc=document.querySelector('meta[name="description"]');
  if(desc&&s.site_description)desc.content=s.site_description;

  /* Home h1 */
  const h1Home=document.getElementById('h1-home');
  if(h1Home)h1Home.textContent=siteTitle;

  /* Nav name */
  document.getElementById('nav-name').textContent=name;

  /* Theme color */
  const themeMeta=document.getElementById('meta-theme-color');
  if(themeMeta&&s.color_background)themeMeta.content=s.color_background;

  /* Preload first slideshow image (BRIEF §Performance) */
  if(s.slideshow_1){
    const preload=document.getElementById('hero-preload');
    if(preload)preload.href=s.slideshow_1;
  }

  /* JSON-LD Person schema */
  const ldEl=document.getElementById('ld-json');
  if(ldEl){
    const instagram=s.instagram_url||'';
    ldEl.textContent=JSON.stringify({
      '@context':'https://schema.org','@type':'Person',
      name:name,jobTitle:role,
      url:'https://muso-design.github.io/art-website/',
      description:document.querySelector('meta[name="description"]')?.content||'',
      sameAs:instagram?[instagram]:[]
    });
  }

  /* Responsive column counts (desktop / tablet / phone) from settings.csv.
     Injected as a stylesheet (appended last) so media queries drive the grid —
     far more flexible than one fixed value, and no !important needed.        */
  const colD=Math.max(1,parseInt(s.grid_columns)||3);
  const colT=Math.max(1,parseInt(s.grid_columns_tablet)||Math.max(1,colD-1));
  const colM=Math.max(1,parseInt(s.grid_columns_mobile)||2);
  let gridCSS=document.getElementById('grid-settings');
  if(!gridCSS){gridCSS=document.createElement('style');gridCSS.id='grid-settings';document.head.appendChild(gridCSS);}
  gridCSS.textContent=
    `.works-grid{grid-template-columns:repeat(${colD},1fr)}`+
    `@media(max-width:1024px){.works-grid{grid-template-columns:repeat(${colT},1fr)}}`+
    `@media(max-width:620px){.works-grid{grid-template-columns:repeat(${colM},1fr)}}`;
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function footerHTML(s){
  const name=s.site_name||'',year=s.site_year||new Date().getFullYear(),loc=s.site_location||'';
  return`<span>&#169; ${esc(String(year))} ${esc(name)}</span>`+

// ═══════════════════════════════════════════════════════════
// HASH ROUTING (BRIEF §Architecture)
// ═══════════════════════════════════════════════════════════
function handleHash(hash){
  if(!hash||hash==='#/'||hash==='#'){navigate('home',true);return;}
  const PAGES=['works','bio','contact'];
  for(const p of PAGES){
    if(hash==='#/'+p){navigate(p,true);return;}
    if(hash.startsWith('#/'+p+'/')){
      navigate(p,true);
      const slug=hash.slice(('#/'+p+'/').length);
      if(p==='works'&&works.length){
        const idx=works.findIndex(w=>String(w.id)===slug||slugify(w.title)===slug);
        if(idx>=0)openLb(idx);
      }
      return;
    }
  }
  navigate('home',true);
}

window.addEventListener('hashchange',()=>handleHash(location.hash));
window.addEventListener('popstate',()=>handleHash(location.hash));

// ═══════════════════════════════════════════════════════════
// AUTO-HIDE CHROME ON SCROLL — nav slides into the top edge,
// footer into the bottom edge when scrolling down; both return
// the moment you scroll up. Frees screen space (esp. on mobile).
// ═══════════════════════════════════════════════════════════
let _lastScrollY=0,_scrollTick=false;
let _navHidden=false,_scrollAccum=0;
const HIDE_AFTER=64;   // must scroll DOWN this many px (cumulative) to hide nav
const SHOW_AFTER=44;   // must scroll UP this many px (cumulative) to show nav
function _setNav(hidden){
  if(hidden===_navHidden)return;
  _navHidden=hidden;
  document.getElementById('main-nav').classList.toggle('nav-hidden',hidden);
}
// The footer carries the (legally required but deliberately low-profile)
// Impressum / Datenschutz links. It stays tucked away and only slides up when
// you OVERSCROLL past the end of a page — i.e. you reach the bottom and keep
// pushing a little further. On a non-scrollable page it likewise needs that
// extra push, so it never just appears on its own.
let _overscroll=0,_footerShown=false;
const FOOTER_REVEAL=80; // extra px to push past the end before it reveals
function _atPageBottom(){
  const y=window.scrollY||document.documentElement.scrollTop||0;
  return (y+window.innerHeight)>=(document.documentElement.scrollHeight-2);
}
function _showFooter(on){
  if(on===_footerShown)return;
  _footerShown=on;
  const ft=document.getElementById('site-footer');
  if(ft)ft.classList.toggle('footer-hidden',!on);
}
function _footerReset(){_overscroll=0;_showFooter(false);}
function _updateFooter(){
  // Tuck the footer away again the moment we move off the very bottom.
  if(currentPage==='home'||!_atPageBottom())_footerReset();
}
function _footerOverscroll(amount){
  if(currentPage==='home')return;
  if(document.getElementById('lightbox').classList.contains('open'))return;
  if(amount>0&&_atPageBottom()){
    _overscroll=Math.min(FOOTER_REVEAL+60,_overscroll+amount);
    if(_overscroll>=FOOTER_REVEAL)_showFooter(true);
  }else if(amount<0){
    _footerReset();
  }
}
window.addEventListener('wheel',e=>_footerOverscroll(e.deltaY),{passive:true});
let _ftTouchY=null;
window.addEventListener('touchstart',e=>{_ftTouchY=e.touches.length===1?e.touches[0].clientY:null;},{passive:true});
window.addEventListener('touchmove',e=>{
  if(_ftTouchY===null||e.touches.length!==1)return;
  const y=e.touches[0].clientY,dy=_ftTouchY-y;  // dy>0 = pushing up toward the end
  _ftTouchY=y;
  _footerOverscroll(dy>0?dy:-1);
},{passive:true});
window.addEventListener('touchend',()=>{_ftTouchY=null;},{passive:true});
function _updateChrome(){
  _scrollTick=false;
  if(document.getElementById('lightbox').classList.contains('open'))return;
  if(currentPage==='home'){_updateFooter();return;}
  const y=Math.max(0,window.scrollY||document.documentElement.scrollTop||0);
  const dy=y-_lastScrollY;
  _lastScrollY=y;
  if(y<=80){_scrollAccum=0;_setNav(false);}
  else{
    // Reset the accumulator on a direction flip so jitter can't cross the
    // threshold — only a deliberate, sustained scroll hides/shows the nav.
    if((dy>0)!==(_scrollAccum>0))_scrollAccum=0;
    _scrollAccum+=dy;
    if(_scrollAccum>HIDE_AFTER)_setNav(true);
    else if(_scrollAccum<-SHOW_AFTER)_setNav(false);
  }
  _updateFooter();
}
window.addEventListener('scroll',()=>{
  if(!_scrollTick){requestAnimationFrame(_updateChrome);_scrollTick=true;}
},{passive:true});

// ═══════════════════════════════════════════════════════════
// SWIPE-DOWN TO DISMISS THE LIGHTBOX (mobile)
// At the very top of the lightbox, a downward pull drags the whole
// panel with the finger; releasing past a threshold closes it.
// ═══════════════════════════════════════════════════════════
(function(){
  const lb=document.getElementById('lightbox');
  if(!lb)return;
  const sw={active:false,startY:0,startX:0,dy:0,decided:false,dismiss:false,closing:false};
  const isMobile=()=>window.matchMedia('(max-width:700px)').matches;
  function snapReset(){
    lb.style.transition='transform 0.32s cubic-bezier(0.22,1,0.36,1),opacity 0.32s ease';
    lb.style.transform='';lb.style.opacity='';
    setTimeout(()=>{lb.style.transition='';},340);
  }
  lb.addEventListener('touchstart',e=>{
    if(sw.closing||!isMobile()||e.touches.length!==1)return;
    if(document.getElementById('lb-zoom').classList.contains('open'))return;
    sw.active=true;sw.decided=false;sw.dismiss=false;sw.dy=0;
    sw.startY=e.touches[0].clientY;sw.startX=e.touches[0].clientX;
  },{passive:true});
  lb.addEventListener('touchmove',e=>{
    if(!sw.active||e.touches.length!==1)return;
    const dy=e.touches[0].clientY-sw.startY,dx=e.touches[0].clientX-sw.startX;
    // Decide on the FIRST real movement so we can claim the gesture before
    // the browser starts its own overscroll (late preventDefault is ignored).
    if(!sw.decided){
      if(Math.abs(dy)<4&&Math.abs(dx)<4)return;
      sw.decided=true;
      // Dismiss only when pulling DOWN, mostly vertically, from the very top
      sw.dismiss=(dy>0&&Math.abs(dy)>Math.abs(dx)&&lb.scrollTop<=0);
      if(!sw.dismiss){sw.active=false;return;} // hand back to native scroll
    }
    if(!sw.dismiss)return;
    if(lb.scrollTop>0){sw.dismiss=false;sw.active=false;snapReset();return;}
    e.preventDefault();
    sw.dy=Math.max(0,dy);
    lb.style.transform='translateY('+(sw.dy*0.9)+'px)';
    lb.style.opacity=String(Math.max(0.3,1-sw.dy/600));
  },{passive:false});
  function end(){
    if(!sw.active)return;
    sw.active=false;
    if(!sw.dismiss)return;
    if(sw.dy>110){
      sw.closing=true;
      lb.style.transition='transform 0.28s ease,opacity 0.28s ease';
      lb.style.transform='translateY(100vh)';lb.style.opacity='0';
      setTimeout(()=>{
        lb.style.transition='';lb.style.transform='';lb.style.opacity='';
        sw.closing=false;closeLb();
      },280);
    }else{
      snapReset();
    }
  }
  lb.addEventListener('touchend',end);
  lb.addEventListener('touchcancel',end);
})();

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.getElementById('lb-zoom').classList.contains('open')){
    if(e.key==='Escape')closeZoom();
    return;
  }
  if(document.getElementById('lightbox').classList.contains('open')){
    if(e.key==='Escape')closeLb();
    if(e.key==='ArrowLeft')lbStep(-1);
    if(e.key==='ArrowRight')lbStep(1);
  }else if(currentPage==='home'){
    if(e.key==='ArrowLeft')slidePrev();
    if(e.key==='ArrowRight')slideNext();
  }
});

// INIT
// ═══════════════════════════════════════════════════════════
async function init(){
  const ld=document.getElementById('loading');
  try{
    const [st,wt,bt,ct]=await Promise.all([
      loadCSV('settings.csv'),loadCSV('works.csv'),
      loadCSV('bio.csv'),loadCSV('contact.csv')
    ]);
    const s=csvKV(st),w=csvObjs(wt),b=csvKV(bt),c=csvKV(ct);
    applySettings(s);
    buildSlideshow(s);
    renderWorks(w);
    renderBio(b,s);
    renderContact(c,s);
    document.getElementById('site-footer').innerHTML=footerHTML(s);
    /* Read hash before showing UI so the correct page/work is open first */
    if(location.hash&&location.hash.length>1){
      handleHash(location.hash);
    }else{
      navigate('home');
    }
    ld.style.display='none';
  }catch(err){
    const isFile=location.protocol==='file:';
    Object.assign(ld.style,{fontFamily:'system-ui,sans-serif',fontSize:'15px',
      letterSpacing:'0',textTransform:'none',textAlign:'center',padding:'40px',
      lineHeight:'1.8'});
    ld.innerHTML=isFile
      ?'<strong>Open via serve.bat</strong><br><br>'
       +'Double-click <code>serve.bat</code> to start the local server,<br>'
       +'then open <a href="http://localhost:8080">http://localhost:8080</a> in your browser.'
      :'<strong>Error:</strong> '+err.message;
  }
}
init();
