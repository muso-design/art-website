<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Roman Chystakhovskyi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
</head>
<body><nav class="dark">
  <a href="index.html" class="nav-name"></a>
  <div class="nav-links"><a href="works.html" class="active">Works</a><a href="bio.html">Bio</a><a href="contact.html">Contact</a></div>
</nav>
<div class="page-header"><h1>Works</h1></div>
<section class="series-section" id="series-section">
  <div class="section-label">Series</div>
  <div id="series-rows"></div>
</section>
<div class="all-label" id="all-works-section">All Works</div>
<div class="grid" id="grid"></div>
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">Close</button>
  <div class="lb-img-pane"><img id="lb-img" src="" alt="" /></div>
  <div class="lb-info">
    <h2 id="lb-title"></h2>
    <div id="lb-meta"></div>
    <span class="lb-series" id="lb-series"></span>
  </div>
  <div class="lb-nav">
    <button id="lb-prev">&#8592; Prev</button>
    <button id="lb-next">Next &#8594;</button>
  </div>
</div><footer>
  <span class="footer-name"></span>
  <span class="footer-loc"></span>
</footer><script>
  const lightbox = document.getElementById('lightbox');
  let items = [], idx = 0;
  function lbOpen(i) {
    idx = i; const el = items[i];
    const img = el.querySelector('img.grid-thumb');
    document.getElementById('lb-img').src = img ? img.src : '';
    renderLightboxItem(el);
    lightbox.classList.add('open'); document.body.style.overflow = 'hidden';
  }
  function lbClose() { lightbox.classList.remove('open'); document.body.style.overflow = ''; }
  document.addEventListener('DOMContentLoaded', () => {
    items = Array.from(document.querySelectorAll('.grid-item'));
    items.forEach((el, i) => el.addEventListener('click', () => lbOpen(i)));
  });
  document.getElementById('lb-close').addEventListener('click', lbClose);
  document.getElementById('lb-prev').addEventListener('click', () => lbOpen((idx-1+items.length)%items.length));
  document.getElementById('lb-next').addEventListener('click', () => lbOpen((idx+1)%items.length));
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key==='Escape') lbClose();
    if (e.key==='ArrowLeft')  document.getElementById('lb-prev').click();
    if (e.key==='ArrowRight') document.getElementById('lb-next').click();
  });
  lightbox.addEventListener('click', e => { if(e.target===lightbox) lbClose(); });
</script></body></html>
