<link rel="stylesheet" href="style.css">
<style>
.contact-body {
  padding: 64px 52px 0;
  max-width: 560px;
}
.contact-body p {
  font-size: clamp(17px, 1.6vw, 20px); font-style: italic;
  line-height: 1.8; color: var(--text); opacity: 0.72;
  font-weight: 300; margin-bottom: 56px;
}
.contact-links { display: flex; flex-direction: column; gap: 20px; }
.contact-link {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; border-bottom: 1px solid var(--border);
}
.contact-link dt {
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--dim);
}
.contact-link a {
  font-size: 14px; color: var(--text); opacity: 0.55;
  text-decoration: none; font-style: italic; letter-spacing: 0.02em;
  transition: opacity 0.2s;
}
.contact-link a:hover { opacity: 1; }
@media (max-width: 768px) {
  .contact-body { padding: 48px 24px 0; }
}
</style>
</head>

<div class="contact-body">

    For exhibition proposals, acquisition enquiries,
    or studio visits — get in touch.
  </p>
  <dl class="contact-links">
    <div class="contact-link">
      <dt>Email</dt>
      <a href="mailto:your@email.com">your@email.com</a>
    </div>
    <div class="contact-link">
      <dt>Instagram</dt>
      <a href="https://instagram.com/yourhandle" target="_blank">@yourhandle</a>
    </div>
    <div class="contact-link">
      <dt>Location</dt>
      <a>Leipzig, Germany</a>
    </div>
  </dl>
</div>
