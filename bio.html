<style>
.bio-wrap {{ padding: 64px var(--page-padding) 0; max-width: 760px; margin: 0 auto; }}

  font-size: var(--body-size); line-height: var(--body-lh);
  font-style: italic; font-weight: 400; color: var(--text);
  opacity: 0.85; margin-bottom: 32px;
}}
.bio-aside {{
  margin-top: 64px; border-top: 1px solid var(--border); padding-top: 48px;
}}
.bio-aside dl {{
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px 40px;

.bio-aside dt {{
  font-size: var(--label-size); letter-spacing: 0.26em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 6px; font-weight: 500;
}}
.bio-aside dd {{
  font-size: 17px; color: var(--text); opacity: 0.75;
  font-style: italic; line-height: 1.55;
}}
@media (max-width: 900px) {{
  .bio-wrap {{ padding-top: 48px; }}
  .bio-aside dl {{ grid-template-columns: 1fr; }}
}}
